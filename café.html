  <style>
    /* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background-color: #f9f9f9;
  color: #333;
  line-height: 1.6;
}

header {
  background: url('images/cafe.jpg') center/cover no-repeat;
  height: 100vh;
  position: relative;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

header .overlay {
  background-color: rgba(0, 0, 0, 0.5);
  padding: 40px;
  text-align: center;
  border-radius: 10px;
}

header h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.menu, .contact {
  padding: 60px 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 40px;
  color: #6b4c3b;
}

.items {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.item {
  background-color: white;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  padding: 20px;
  text-align: center;
}

.item img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 15px;
}

/* Formulaire de contact */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 600px;
  margin: auto;
}

form input, form textarea {
  padding: 15px;
  font-size: 1rem;
  border: 1px solid #ccc;
  border-radius: 8px;
}

form button {
  padding: 15px;
  font-size: 1rem;
  border: none;
  background-color: #6b4c3b;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s;
}

form button:hover {
  background-color: #523928;
}

/* Footer */
footer {
  background-color: #333;
  color: white;
  text-align: center;
  padding: 20px;
  font-size: 0.9rem;
}
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  background-color: #6b4c3b;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-weight: bold;
  transition: background 0.3s;
}

.btn:hover {
  background-color: #523928;
}

  </style>
</head>
